<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{background:#050505; color:white; overflow-x: hidden;}
        .dash-border { border: 1px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8 md:p-20">
    <script>
        // Security Check
        if(!localStorage.getItem('_FORGENOS_AUTH_')) {
            window.location.href = '/index.html';
        }
    </script>

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end mb-12 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-5xl font-black uppercase italic">Access <span class="text-[#E50914]">Granted</span></h1>
                <p class="text-gray-500 mt-2 uppercase tracking-widest text-xs">License: Active / Perpetual</p>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="text-xs text-gray-600 hover:text-white uppercase">Logout</button>
        </header>

        <div class="grid md:grid-cols-2 gap-10">
            <div class="bg-[#111] p-10 rounded-3xl border border-white/5">
                <h3 class="text-xl font-bold mb-4">Download Assets</h3>
                <p class="text-gray-400 text-sm mb-8">Sabhi premium files niche di gayi link se download karein.</p>
                <a href="#" class="block text-center bg-white text-black font-black py-4 rounded-xl hover:bg-[#E50914] hover:text-white transition-colors">
                    DOWNLOAD .ZIP (2.4 GB)
                </a>
            </div>

            <div class="dash-border p-10 rounded-3xl">
                <h3 class="text-xl font-bold mb-4 text-[#E50914]">Documentation</h3>
                <p class="text-gray-500 text-sm italic leading-relaxed">
                    "This utility is provided for professional use only. Ensure all local environment variables are configured before deployment."
                </p>
            </div>
        </div>
    </div>
</body>
</html>
