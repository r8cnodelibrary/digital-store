<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGENOS | Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .red-glow:hover { box-shadow: 0 0 30px rgba(229, 9, 20, 0.3); border-color: #E50914; }
        .bg-grid { background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-grid">
    <nav class="flex justify-between items-center px-10 py-6 border-b border-white/5 glass sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter uppercase">FORGE<span class="text-[#E50914]">NOS</span></div>
        <div class="space-x-8 text-sm font-medium text-gray-400 uppercase tracking-widest">
            <a href="#" class="hover:text-white transition">Catalog</a>
            <a href="#" class="hover:text-white transition">Support</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto pt-20 px-6">
        <div class="text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter italic uppercase">Master the <span class="text-[#E50914]">Digital</span> Realm</h1>
            <p class="text-gray-500 max-w-xl mx-auto text-lg leading-relaxed">High-performance assets for creators, developers, and digital architects. One-time payment. Lifetime access.</p>
        </div>

        <div class="grid md:grid-cols-1 gap-8 max-w-2xl mx-auto">
            <div class="glass p-8 rounded-2xl border border-white/10 transition-all duration-500 red-glow group">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <span class="text-[#E50914] text-xs font-black tracking-[0.2em] uppercase">Popular Asset</span>
                        <h2 class="text-3xl font-bold mt-2">FORGENOS CORE V1</h2>
                    </div>
                    <div class="text-3xl font-black text-white italic">₹499</div>
                </div>
                
                <ul class="space-y-3 mb-8 text-gray-400 text-sm">
                    <li class="flex items-center">✓ 4K High Fidelity Source Files</li>
                    <li class="flex items-center">✓ Commercial License Included</li>
                    <li class="flex items-center">✓ Priority Updates</li>
                </ul>

                <button onclick="payNow()" class="w-full bg-[#E50914] hover:bg-[#b3070f] text-white py-5 rounded-xl font-black uppercase tracking-widest transition-all transform group-hover:scale-[1.02]">
                    Unlock Access Now
                </button>
            </div>
        </div>
    </main>

    <script>
        const cashfree = Cashfree({ mode: "sandbox" }); // Prod me "production" kar dena
        async function payNow() {
            try {
                // Ye Vercel API ko call karega
                const r = await fetch('/api/create-order', { method: 'POST' });
                const d = await r.json();
                cashfree.checkout({ paymentSessionId: d.payment_session_id });
            } catch (e) { alert("Server Error. Check Vercel Logs."); }
        }
    </script>
</body>
</html>
