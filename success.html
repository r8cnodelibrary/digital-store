<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#050505; color:white;}</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="w-16 h-16 border-4 border-[#E50914] border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
        <h1 class="text-2xl font-bold tracking-widest uppercase">Verifying Transaction...</h1>
        <p class="text-gray-500 mt-2">Checking payment status with Cashfree.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');

        if(orderId) {
            // Success Logic: Yaha hum ek local "License Key" generate kar rahe hain
            setTimeout(() => {
                localStorage.setItem('_FORGENOS_AUTH_', btoa(orderId));
                localStorage.setItem('_PAYMENT_STATE_', 'SUCCESS');
                window.location.href = '/product.html';
            }, 2000);
        } else {
            document.body.innerHTML = "<h1 class='text-red-600 font-bold'>Invalid Request</h1>";
        }
    </script>
</body>
</html>
